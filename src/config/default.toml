[bot]
name = "alpha-bot-v1"
dry_run = true
log_level = "info"
max_trades_per_hour = 60
trading_window_start_utc = 0
trading_window_end_utc = 24

[wallet]
keypair_path = "./secrets/keypair.json"
max_total_capital_sol = 10.0
max_position_size_sol = 0.3
max_concurrent_positions = 8
reserve_sol = 1.0

[rpc]
helius_api_key         = "YOUR_HELIUS_KEY"
helius_rpc_url         = "https://mainnet.helius-rpc.com/?api-key=YOUR_HELIUS_KEY"
helius_ws_url          = "wss://mainnet.helius-rpc.com/?api-key=YOUR_HELIUS_KEY"
yellowstone_grpc_url   = "YOUR_HELIUS_GRPC_ENDPOINT"
yellowstone_grpc_token = "YOUR_HELIUS_GRPC_TOKEN"
quicknode_url          = "YOUR_QUICKNODE_URL"
quicknode_ws_url       = "YOUR_QUICKNODE_WS_URL"
shyft_api_key          = "YOUR_SHYFT_KEY"

[jito]
block_engines = [
    "https://mainnet.block-engine.jito.wtf/api/v1/bundles",
    "https://amsterdam.mainnet.block-engine.jito.wtf/api/v1/bundles",
    "https://tokyo.mainnet.block-engine.jito.wtf/api/v1/bundles",
    "https://ny.mainnet.block-engine.jito.wtf/api/v1/bundles",
    "https://dallas.mainnet.block-engine.jito.wtf/api/v1/bundles",
]
auth_keypair_path     = "./secrets/jito_keypair.json"
tip_percentile_target = 75
tip_min_lamports      = 10000
tip_max_lamports      = 5000000
tip_profit_share      = 0.50
tip_account           = "96gYZGLnJYVFmbjzopPSU6QiEV5fGqZNyN9nmNhvrZU5"

[bloxroute]
enabled     = false
auth_header = "YOUR_BLOXROUTE_AUTH"
endpoint    = "https://virginia.solana.dex.blxrbdn.com"

[nozomi]
enabled  = false
api_key  = "YOUR_NOZOMI_KEY"
endpoint = "https://pit1.nozomi.temporal.xyz/?c=YOUR_NOZOMI_KEY"

[database]
postgres_url         = "postgresql://bot:password@localhost:5432/memecoin_bot"
redis_url            = "redis://localhost:6379"
pool_max_connections = 20

[signals.twitter]
bearer_token              = "YOUR_TWITTER_BEARER_TOKEN"
kol_accounts              = []
trigger_keywords          = ["CA:", "contract:", "just launched", "new gem", "100x", "moonshot"]
min_kol_followers         = 10000
sentiment_score_threshold = 0.75

[signals.telegram]
api_id   = "YOUR_TELEGRAM_API_ID"
api_hash = "YOUR_TELEGRAM_API_HASH"
phone    = "+1234567890"
groups   = ["solana_alpha", "pump_fun_calls"]
min_message_velocity = 5

[filter]
min_liquidity_usd                = 50000
max_liquidity_usd                = 5000000
min_market_cap_usd               = 200000
max_market_cap_usd               = 1000000
max_token_age_hours              = 72
min_buy_count_24h                = 500
min_sell_count_24h               = 300
max_dev_holding_pct              = 0.05
max_sniper_concentration_pct     = 0.03
min_win_probability              = 0.55
min_sentiment_score              = 0.60
require_mint_authority_disabled  = true
require_freeze_authority_disabled = true
min_lp_lock_days                 = 30
max_creator_rug_history          = 0
max_price_impact_5pct_sell       = 0.30

[strategy]
snipe_entry_1_pct        = 0.30
snipe_entry_2_delay_secs = 30
snipe_entry_2_pct        = 0.30
snipe_entry_3_delay_secs = 90
snipe_entry_3_pct        = 0.40
tp_1_multiplier          = 1.5
tp_1_sell_pct            = 0.30
tp_2_multiplier          = 2.0
tp_2_sell_pct            = 0.30
tp_3_trailing_stop_pct   = 0.25
hard_stop_loss_pct        = 0.20
time_stop_minutes         = 60
max_daily_loss_sol        = 2.0
circuit_breaker_consecutive_losses = 3
circuit_breaker_pause_minutes      = 30
copy_trade_enabled        = true
copy_wallets              = []
copy_max_buy_sol          = 0.2
copy_wallet_min_winrate   = 0.60

[execution]
skip_preflight         = true
commitment             = "processed"
max_retries            = 3
retry_delay_ms         = 500
slippage_start_bps     = 500
slippage_max_bps       = 2000
slippage_increment_bps = 300

[models]
tabular_model_path     = "./ml/models/catboost.onnx"
transformer_model_path = "./ml/models/price_transformer.onnx"
gnn_model_path         = "./ml/models/wallet_gnn.onnx"
nlp_model_path         = "./ml/models/sentiment_finbert.onnx"
tabular_weight         = 0.30
transformer_weight     = 0.25
gnn_weight             = 0.30
nlp_weight             = 0.15
ensemble_threshold     = 0.80
retrain_cron           = "0 2 * * 0"

[monitor]
prometheus_port          = 9090
dashboard_port           = 8080
alert_webhook_url        = "YOUR_DISCORD_WEBHOOK_URL"
alert_on_trade           = true
alert_on_loss_pct        = 0.15
alert_on_circuit_breaker = true
